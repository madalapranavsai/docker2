events {}
http {
    # Define the upstream pool
    upstream backend_servers {
        # 'app' is the Docker Compose service name. 
        # Docker DNS will resolve this to the IPs of all running replicas.
        server app:8080;
    }

    server {
        listen 80;
        location / {
            proxy_pass http://backend_servers;
            # Pass the backend server name back to the client for debugging
            add_header X-Upstream $upstream_addr;
        }
    }
}
